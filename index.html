<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#16161e" />
    <meta name="description" content="Conway's Game of Life - an interactive cellular automaton playground." />
    <title>Conway's Game of Life</title>
    <script>
      (function () {
        var OLD = ['mocha', 'tokyo-night', 'dracula', 'nord', 'forest'];
        var theme = 'tokyo';
        try { var s = localStorage.getItem('site-theme'); if (s && OLD.indexOf(s) === -1) theme = s; } catch (e) {}
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
